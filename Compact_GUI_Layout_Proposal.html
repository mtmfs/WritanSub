<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WritanSub 紧凑型 GUI 布局方案</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 15px;
            box-sizing: border-box;
            gap: 15px;
        }
        
        /* 通用卡片样式 */
        .card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
        }
        .card-header {
            font-size: 13px;
            font-weight: 600;
            color: #00a2ff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }

        /* 1. 顶部文件区 */
        .file-section {
            display: flex;
            gap: 12px;
            height: 140px;
        }
        .file-list-container { flex: 1; display: flex; flex-direction: column; }
        .file-list { 
            flex: 1; background: #181818; border: 1px solid #333; 
            border-radius: 4px; overflow-y: auto; font-size: 12px;
        }
        .file-item { padding: 6px 10px; border-bottom: 1px solid #222; }
        .file-btns { display: flex; flex-direction: column; gap: 6px; }
        .file-btns button { 
            background: #333; color: #eee; border: 1px solid #444; 
            padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
        }

        /* 2. 中间参数区 - 三列网格 */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }
        .setting-item { 
            display: flex; align-items: center; justify-content: space-between; 
            margin-bottom: 8px; font-size: 12px; 
        }
        .setting-item label { color: #aaa; }
        select, input[type="number"] { 
            background: #2a2a2a; color: #fff; border: 1px solid #444; 
            padding: 2px 6px; border-radius: 3px; width: 80px;
        }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
        .checkbox-item { display: flex; align-items: center; gap: 4px; font-size: 12px; cursor: pointer; }

        /* 3. 后处理参数 - 压扁显示 */
        .post-process-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 5px;
        }

        /* 4. 底部日志与控制区 */
        .bottom-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 100px;
        }
        .log-window {
            flex: 1; background: #000; color: #00ff00; 
            font-family: 'Consolas', monospace; font-size: 11px; 
            padding: 8px; border-radius: 4px; overflow-y: auto;
            opacity: 0.8;
        }
        
        /* 核心控制栏 */
        .control-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        .progress-box { flex: 1; }
        .progress-info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
        .progress-bar { background: #333; height: 6px; border-radius: 3px; overflow: hidden; }
        .progress-fill { width: 45%; height: 100%; background: linear-gradient(90deg, #007acc, #00a2ff); }
        
        .action-btns { display: flex; gap: 10px; align-items: center; }
        .btn-start { 
            background: #007acc; color: white; border: none; 
            padding: 10px 30px; border-radius: 4px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 2px 10px rgba(0,122,204,0.3);
        }
        .btn-cancel { background: #444; color: #ccc; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 1. 媒体文件选择 -->
    <div class="card file-section">
        <div class="file-list-container">
            <div class="card-header">媒体列表 (支持拖入)</div>
            <div class="file-list">
                <div class="file-item">C:/Videos/Movie_Jp_01.mp4</div>
                <div class="file-item">C:/Videos/Interview_Clip.mkv</div>
            </div>
        </div>
        <div class="file-btns">
            <button>添加文件</button>
            <button>移除选中</button>
            <button>清空列表</button>
        </div>
    </div>

    <!-- 2. 核心设置网格 -->
    <div class="settings-grid">
        <!-- 列1: 模型基础 -->
        <div class="card">
            <div class="card-header">模型基础配置</div>
            <div class="setting-item">
                <label>识别语言</label>
                <select><option>ja</option></select>
            </div>
            <div class="setting-item">
                <label>Whisper 设备</label>
                <select><option>cuda</option></select>
            </div>
            <div class="setting-item">
                <label>对齐设备</label>
                <select><option>cuda</option></select>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" checked> <label>启用前文调优 (Condition Prev)</label>
            </div>
        </div>

        <!-- 列2: TIGER 增强 -->
        <div class="card">
            <div class="card-header">TIGER 增强处理</div>
            <div class="checkbox-group">
                <div class="checkbox-item"><input type="checkbox"> <label>人声去噪 (DnR)</label></div>
                <div class="checkbox-item"><input type="checkbox" checked> <label>重叠分离 (Separate)</label></div>
                <div class="checkbox-item"><input type="checkbox"> <label>保存中间音轨</label></div>
            </div>
            <div class="setting-item" style="margin-top:10px;">
                <label>TIGER 设备</label>
                <select><option>cuda</option></select>
            </div>
        </div>

        <!-- 列3: 输出控制 -->
        <div class="card">
            <div class="card-header">输出保留选项</div>
            <div class="checkbox-group">
                <div class="checkbox-item"><input type="checkbox" checked> <label>Whisper SRT</label></div>
                <div class="checkbox-item"><input type="checkbox" checked> <label>对齐 SRT</label></div>
                <div class="checkbox-item"><input type="checkbox" checked> <label>Review 校验文件</label></div>
            </div>
        </div>
    </div>

    <!-- 3. 后处理精细参数 (一排横向) -->
    <div class="card">
        <div class="card-header">对齐后处理精细参数</div>
        <div class="post-process-row">
            <div class="setting-item"><label>尾部延展</label><input type="number" value="0.30"></div>
            <div class="setting-item"><label>首部延展</label><input type="number" value="0.00"></div>
            <div class="setting-item"><label>合并阈值</label><input type="number" value="0.50"></div>
            <div class="setting-item"><label>最小间隔</label><input type="number" value="0.30"></div>
            <div class="setting-item"><label>词置信度</label><input type="number" value="0.50"></div>
            <div class="setting-item"><label>对齐置信</label><input type="number" value="0.50"></div>
            <div class="setting-item"><label>最小持续</label><input type="number" value="0.30"></div>
        </div>
    </div>

    <!-- 4. 底部日志与控制区 -->
    <div class="bottom-section">
        <div class="log-window">
            [14:20:05] [INFO] Loaded CUDA successfully.<br>
            [14:20:10] [PROCESS] Processing video_01.mp4 (Step 1/2: Whisper)...
        </div>
        
        <div class="control-bar">
            <div class="checkbox-item" style="padding-right: 20px;">
                <input type="checkbox" checked id="trans"> <label for="trans" style="font-weight:bold; color:#00a2ff;">启用 AI 翻译</label>
            </div>
            
            <div class="progress-box">
                <div class="progress-info">
                    <span>当前进度: 45%</span>
                    <span>正在执行: Whisper 推理</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <div class="action-btns">
                <button class="btn-cancel">取消</button>
                <button class="btn-start">开始处理</button>
            </div>
        </div>
    </div>

</body>
</html>
